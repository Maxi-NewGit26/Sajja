<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="sealBg512" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9E2A2B" />
      <stop offset="70%" stop-color="#7A1C1C" />
      <stop offset="100%" stop-color="#3D0909" />
    </radialGradient>
    <linearGradient id="goldGrad512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E5AB" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#997A29" />
    </linearGradient>
    <filter id="shadow512" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.45" />
    </filter>
  </defs>

  <!-- Background Circle (Red Parchment Context) -->
  <rect width="512" height="512" rx="96" fill="#F8F4E8" />

  <!-- Outer Wax Seal Body -->
  <g filter="url(#shadow512)">
    <path d="M 256,42 
             C 288,32 320,53 352,48 
             C 384,43 411,69 432,91 
             C 453,113 475,145 470,177 
             C 465,209 486,241 475,273 
             C 464,305 449,337 422,358 
             C 395,379 374,411 342,422 
             C 310,433 278,422 256,428 
             C 234,434 202,445 170,422 
             C 138,399 113,379 91,358 
             C 69,337 37,305 42,273 
             C 47,241 26,209 37,177 
             C 48,145 69,113 91,91 
             C 113,69 138,43 170,48 
             C 202,53 224,32 256,42 Z" 
          fill="url(#sealBg512)" stroke="url(#goldGrad512)" stroke-width="6" />

    <!-- Inner Golden Ring -->
    <circle cx="256" cy="256" r="166" fill="none" stroke="url(#goldGrad512)" stroke-width="5" stroke-dasharray="20 8" />
    <circle cx="256" cy="256" r="150" fill="none" stroke="url(#goldGrad512)" stroke-width="4" />

    <!-- Center Thai Sacred Emblem "ส" -->
    <text x="256" y="300" font-family="'Noto Serif Thai', 'Times New Roman', serif" font-weight="900" font-size="140" fill="url(#goldGrad512)" text-anchor="middle">ส</text>
    
    <!-- Decorative Dots -->
    <circle cx="256" cy="122" r="8" fill="url(#goldGrad512)" />
    <circle cx="256" cy="390" r="8" fill="url(#goldGrad512)" />
    <circle cx="122" cy="256" r="8" fill="url(#goldGrad512)" />
    <circle cx="390" cy="256" r="8" fill="url(#goldGrad512)" />
  </g>
</svg>
