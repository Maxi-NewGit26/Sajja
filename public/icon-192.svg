<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <radialGradient id="sealBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9E2A2B" />
      <stop offset="70%" stop-color="#7A1C1C" />
      <stop offset="100%" stop-color="#3D0909" />
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E5AB" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#997A29" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Background Circle (Red Parchment Context) -->
  <rect width="192" height="192" rx="36" fill="#F8F4E8" />

  <!-- Outer Wax Seal Body -->
  <g filter="url(#shadow)">
    <!-- Wavy Wax Seal Edges -->
    <path d="M 96,16 
             C 108,12 120,20 132,18 
             C 144,16 154,26 162,34 
             C 170,42 178,54 176,66 
             C 174,78 182,90 178,102 
             C 174,114 168,126 158,134 
             C 148,142 140,154 128,158 
             C 116,162 104,158 96,160 
             C 88,162 76,166 64,158 
             C 52,150 42,142 34,134 
             C 26,126 14,114 16,102 
             C 18,90 10,78 14,66 
             C 18,54 26,42 34,34 
             C 42,26 52,16 64,18 
             C 76,20 84,12 96,16 Z" 
          fill="url(#sealBg)" stroke="url(#goldGrad)" stroke-width="2.5" />

    <!-- Inner Golden Ring -->
    <circle cx="96" cy="96" r="62" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-dasharray="8 3" />
    <circle cx="96" cy="96" r="56" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" />

    <!-- Center Thai Sacred Emblem "ส" -->
    <text x="96" y="112" font-family="'Noto Serif Thai', 'Times New Roman', serif" font-weight="900" font-size="52" fill="url(#goldGrad)" text-anchor="middle">ส</text>
    
    <!-- Top & Bottom Decorative Dots -->
    <circle cx="96" cy="46" r="3" fill="url(#goldGrad)" />
    <circle cx="96" cy="146" r="3" fill="url(#goldGrad)" />
    <circle cx="46" cy="96" r="3" fill="url(#goldGrad)" />
    <circle cx="146" cy="96" r="3" fill="url(#goldGrad)" />
  </g>
</svg>
